services:
  my-docs:
    image: node
    entrypoint: sh docker-entrypoint.sh
    restart: always
    user: ${UID:-1000}:${GID:-1000}
    userns_mode: keep-id # used only by podman, ignored by docker
    ports:
      - ${PORT:-3000}:${PORT:-3000}
    environment:
      PORT: ${PORT:-3000}
    volumes:
      - ${PWD}:${PWD}
    working_dir: ${PWD}
